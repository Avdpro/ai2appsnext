<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blocker Fixture - Noncloseable Captcha</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { padding: 24px; }
    .overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(15,20,30,0.72);
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      width: min(560px, 92vw);
      background: #fff; color: #111; border-radius: 12px;
      padding: 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }
    .captcha-box {
      margin-top: 10px;
      border: 1px dashed #888;
      border-radius: 8px;
      padding: 12px;
      color: #333;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <main>
    <h1>Fixture: Noncloseable Captcha Blocker</h1>
    <p>该 blocker 预期识别为 captcha，不应走自动简单关闭。</p>
  </main>

  <div id="captcha-overlay" class="overlay captcha verify-human modal" role="dialog" aria-modal="true">
    <section class="card">
      <h2>请先完成验证码</h2>
      <p>Verify you are human to continue.</p>
      <div class="captcha-box">[ CAPTCHA WIDGET PLACEHOLDER ]</div>
    </section>
  </div>
</body>
</html>
