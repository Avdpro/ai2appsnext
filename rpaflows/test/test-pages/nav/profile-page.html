<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>个人主页 - 测试用户</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f3f4f6; color: #111827; }
    .wrap { max-width: 920px; margin: 20px auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; }
    .header { display: flex; gap: 12px; align-items: center; }
    .avatar { width: 64px; height: 64px; border-radius: 50%; background: #dbeafe; display: grid; place-items: center; }
    .stats { display: flex; gap: 16px; margin-top: 10px; }
  </style>
</head>
<body>
  <main class="wrap" itemtype="https://schema.org/Person" itemscope>
    <div class="header">
      <div class="avatar" aria-label="avatar">👤</div>
      <div>
        <h1 itemprop="name">测试用户</h1>
        <p itemprop="description">个人简介：这是一个用于自动化验证的 Profile 页面。</p>
      </div>
    </div>
    <div class="stats">
      <span>关注 12</span>
      <span>粉丝 345</span>
      <span>获赞 678</span>
    </div>
  </main>
</body>
</html>
