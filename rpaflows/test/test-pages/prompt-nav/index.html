<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prompt Nav Test - Start</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --fg: #0f172a;
      --muted: #475569;
      --card: #ffffff;
      --line: #dbe4ee;
      --primary: #0ea5e9;
      --primary2: #0284c7;
      --warn: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--fg);
      background:
        radial-gradient(80rem 80rem at 120% -10%, #e0f2fe 0%, transparent 45%),
        radial-gradient(60rem 60rem at -20% 120%, #e2e8f0 0%, transparent 40%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 12px 36px rgba(2, 8, 23, 0.08);
      padding: 20px;
    }
    h1 { margin: 0 0 10px 0; font-size: 24px; }
    p { margin: 8px 0; color: var(--muted); line-height: 1.5; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    button {
      border: 1px solid #075985;
      background: linear-gradient(180deg, var(--primary), var(--primary2));
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      border-color: #64748b;
      background: linear-gradient(180deg, #94a3b8, #64748b);
    }
    button:disabled { opacity: 0.6; cursor: default; }
    .log {
      margin-top: 14px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: #f8fafc;
      padding: 10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      min-height: 56px;
      white-space: pre-wrap;
    }
    .warn { color: var(--warn); font-weight: 700; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Prompt 跨导航测试页（起点）</h1>
    <p>用途：配合 `ask_assist(persistAcrossNav=true)` 验证弹窗在跳转/刷新后是否自动恢复。</p>
    <p class="warn">操作：先由 Flow 点击按钮，再观察 3 秒后跳转/刷新时 Prompt 是否依然存在。</p>
    <div class="actions">
      <button id="start-nav" type="button">3 秒后跳转到 next.html</button>
      <button id="start-reload" class="secondary" type="button">3 秒后刷新当前页</button>
    </div>
    <div id="log" class="log">ready</div>
  </main>
  <script>
    (function () {
      const logEl = document.getElementById("log");
      const navBtn = document.getElementById("start-nav");
      const reloadBtn = document.getElementById("start-reload");
      let timer = null;

      function log(msg) {
        const t = new Date().toISOString().slice(11, 19);
        logEl.textContent += `\n[${t}] ${msg}`;
      }

      function arm(kind) {
        if (timer) clearTimeout(timer);
        navBtn.disabled = true;
        reloadBtn.disabled = true;
        log(`armed: ${kind}, will trigger in 3000ms`);
        timer = setTimeout(function () {
          if (kind === "reload") {
            log("reloading...");
            location.reload();
            return;
          }
          const u = new URL("./next.html", location.href);
          u.searchParams.set("from", "index");
          u.searchParams.set("ts", String(Date.now()));
          log("navigating...");
          location.href = u.toString();
        }, 3000);
      }

      navBtn.addEventListener("click", function () { arm("nav"); });
      reloadBtn.addEventListener("click", function () { arm("reload"); });
    })();
  </script>
</body>
</html>
