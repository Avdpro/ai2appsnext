<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login Fixture - Any Credentials</title>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f7fb; color: #111; }
    main { max-width: 980px; margin: 0 auto; padding: 28px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); padding: 18px; }
    .state { display: inline-block; padding: 4px 8px; border-radius: 8px; font-size: 13px; font-weight: 600; }
    .state.off { background: #ffe8e8; color: #9f2323; }
    .state.on { background: #e7f8eb; color: #1d7a34; }
    .overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(9,12,18,0.60);
      display: flex; align-items: center; justify-content: center;
    }
    .dialog {
      width: min(520px, 92vw);
      background: #fff; border-radius: 12px; padding: 16px;
      box-shadow: 0 14px 45px rgba(0,0,0,0.35);
    }
    .f { display: grid; gap: 8px; margin-top: 10px; }
    label { font-size: 13px; color: #333; }
    input {
      border: 1px solid #cfd7e6; border-radius: 8px;
      padding: 10px 11px; font-size: 14px;
    }
    .actions { display: flex; gap: 10px; margin-top: 14px; }
    button {
      border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer;
      font-weight: 600;
    }
    #login-submit { background: #2364ff; color: #fff; }
    #logout-btn { background: #eceff4; color: #111; }
    #helper {
      margin-top: 12px; font-size: 13px; color: #555;
      background: #f8fafc; border: 1px solid #e6ebf5; border-radius: 8px; padding: 10px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Login Fixture: Any Credentials Accepted</h1>
    <div class="card">
      <p>当前登录状态：
        <span id="login-state" data-login-state="logged-out" class="state off">logged-out</span>
      </p>
      <p>当前用户：<span id="current-user">-</span></p>
      <button id="logout-btn" type="button">退出登录（重置）</button>
      <div id="helper">
        说明：输入任意邮箱和密码（甚至空值）点击“登录”即视为登录成功。用于自动化 login.check/login.ensure 测试。
      </div>
    </div>
  </main>

  <div id="login-overlay" class="overlay login modal" role="dialog" aria-modal="true">
    <section class="dialog">
      <h2>请登录继续</h2>
      <p>任意邮箱与密码都可登录成功。</p>
      <div class="f">
        <label for="login-email">邮箱</label>
        <input id="login-email" name="email" autocomplete="off" placeholder="name@example.com" />
      </div>
      <div class="f">
        <label for="login-password">密码</label>
        <input id="login-password" name="password" type="password" autocomplete="off" placeholder="any password" />
      </div>
      <div class="actions">
        <button id="login-submit" type="button">登录</button>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const KEY = "mock_login_logged_in";
      const USER_KEY = "mock_login_user";
      const stateEl = document.getElementById("login-state");
      const userEl = document.getElementById("current-user");
      const overlay = document.getElementById("login-overlay");
      const emailEl = document.getElementById("login-email");
      const passEl = document.getElementById("login-password");
      const loginBtn = document.getElementById("login-submit");
      const logoutBtn = document.getElementById("logout-btn");

      function readFlag() {
        try { return localStorage.getItem(KEY) === "1"; } catch (_) { return false; }
      }
      function readUser() {
        try { return localStorage.getItem(USER_KEY) || ""; } catch (_) { return ""; }
      }
      function writeLogin(userText) {
        try {
          localStorage.setItem(KEY, "1");
          localStorage.setItem(USER_KEY, String(userText || "mock-user"));
        } catch (_) {}
      }
      function clearLogin() {
        try {
          localStorage.removeItem(KEY);
          localStorage.removeItem(USER_KEY);
        } catch (_) {}
      }
      function render() {
        const loggedIn = readFlag();
        const user = readUser();
        if (loggedIn) {
          overlay.style.display = "none";
          logoutBtn.style.display = "inline-block";
          stateEl.textContent = "logged-in";
          stateEl.dataset.loginState = "logged-in";
          stateEl.classList.remove("off");
          stateEl.classList.add("on");
          userEl.textContent = user || "-";
          document.body.setAttribute("data-login-state", "logged-in");
        } else {
          overlay.style.display = "flex";
          logoutBtn.style.display = "none";
          stateEl.textContent = "logged-out";
          stateEl.dataset.loginState = "logged-out";
          stateEl.classList.remove("on");
          stateEl.classList.add("off");
          userEl.textContent = "-";
          document.body.setAttribute("data-login-state", "logged-out");
        }
      }

      loginBtn.addEventListener("click", function () {
        const email = String(emailEl.value || "").trim();
        const password = String(passEl.value || "").trim();
        const user = email || "user+" + (password ? "with-pass" : "no-pass");
        writeLogin(user);
        render();
      });

      logoutBtn.addEventListener("click", function () {
        clearLogin();
        render();
      });

      const p = new URLSearchParams(location.search);
      if (p.get("reset") === "1") clearLogin();
      render();
    })();
  </script>
</body>
</html>
