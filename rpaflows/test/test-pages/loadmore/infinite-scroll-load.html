<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LoadMore Test - Infinite Scroll</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background:#f6f7fb; color:#111; }
    .wrap { max-width: 840px; margin: 24px auto; padding: 0 12px; }
    h1 { margin: 0 0 12px; font-size: 24px; }
    #feed { height: 420px; overflow-y: auto; border:1px solid #d4d7e0; border-radius: 12px; background:#fff; padding: 10px; }
    .row { border:1px solid #e0e0e0; border-radius: 10px; padding: 10px; margin-bottom: 10px; min-height: 56px; }
    #status { margin-top:10px; color:#444; font-size:14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>滚动加载测试</h1>
    <div id="feed"></div>
    <div id="status"></div>
  </div>
  <script>
    const BATCH = 7;
    const MAX_BATCH = 4;
    let loadedBatch = 0;
    let total = 0;
    let loading = false;

    function appendBatch() {
      if (loadedBatch >= MAX_BATCH) return false;
      loadedBatch += 1;
      const feed = document.getElementById("feed");
      for (let i = 0; i < BATCH; i++) {
        total += 1;
        const div = document.createElement("div");
        div.className = "row item";
        div.innerHTML = "<strong>Feed " + total + "</strong><div>Batch " + loadedBatch + " / " + MAX_BATCH + "</div>";
        feed.appendChild(div);
      }
      syncStatus();
      return true;
    }

    function syncStatus() {
      const st = document.getElementById("status");
      st.textContent = "批次 " + loadedBatch + "/" + MAX_BATCH + "，条目 " + total;
    }

    function maybeLoadMore() {
      const feed = document.getElementById("feed");
      if (loading) return;
      if (loadedBatch >= MAX_BATCH) return;
      const nearBottom = feed.scrollTop + feed.clientHeight >= feed.scrollHeight - 20;
      if (!nearBottom) return;
      loading = true;
      setTimeout(() => {
        appendBatch();
        loading = false;
      }, 260);
    }

    const feed = document.getElementById("feed");
    feed.addEventListener("scroll", maybeLoadMore);
    appendBatch();
    appendBatch();
  </script>
</body>
</html>
