<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read Reactions Local Test</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 24px; }
    .post { max-width: 760px; border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
    .toolbar { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
    .tool { border: 1px solid #ccc; border-radius: 8px; padding: 8px 10px; background: #fafafa; }
    .noise { margin-top: 16px; color: #666; }
  </style>
</head>
<body>
  <article id="post-main" class="post">
    <h1>测试帖子：读取互动数据</h1>
    <p>这是用于验证 read.reactions 的本地测试页面。</p>

    <div id="reaction-panel" class="toolbar">
      <button class="tool" aria-label="点赞 1.2k">👍 点赞 1.2k</button>
      <button class="tool" aria-label="评论 345">💬 评论 345</button>
      <button class="tool" title="转发 87">🔁 转发 87</button>
      <button class="tool" data-testid="favorite-count">⭐ 收藏 56</button>
      <span class="tool">👀 浏览 9.8万</span>
    </div>
  </article>

  <div class="noise">
    <p>噪音文本：按热度 / 按时间 / 登录 / 隐私政策</p>
  </div>
</body>
</html>
