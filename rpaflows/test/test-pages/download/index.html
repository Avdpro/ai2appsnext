<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Download Test</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f3f4f6; color: #111827; }
    .wrap { max-width: 900px; margin: 24px auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 18px; }
    a { display: inline-block; margin-right: 12px; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; text-decoration: none; color: #111827; }
    a:hover { background: #eef2ff; border-color: #818cf8; }
    code { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 2px 6px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>下载测试页</h1>
    <p>点击后应触发浏览器下载事件。</p>
    <a id="download-link" href="/download/files/sample.txt" download="sample.txt">下载 sample.txt</a>
    <a id="download-link-2" href="/download/files/sample.json" download="sample.json">下载 sample.json</a>
    <p>文件路径：<code>/download/files/sample.txt</code></p>
  </main>
</body>
</html>
