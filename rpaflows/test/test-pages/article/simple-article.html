<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>测试文章页 - Read Article Smoke</title>
  <style>
    body { margin: 0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background: #f7f7fb; color: #111; }
    .wrap { max-width: 760px; margin: 24px auto; padding: 0 14px; }
    article { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { line-height: 1.75; margin: 0 0 12px; }
    .meta { color: #666; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <article id="article-root">
      <h1>AceFox 与 RPA 测试文章</h1>
      <div class="meta">2026-02-17 · rpaflows local test</div>
      <p>这是一篇用于 read.article 本地回归测试的示例文章。页面结构尽量简单，便于稳定验证。</p>
      <p>目标是确认系统能够读取标题、URL 以及正文 markdown 内容，并以统一的 read.result 结构返回。</p>
      <p>如果你看到这一段，说明文章正文足够长，可以用于最小长度与关键字匹配校验。</p>
    </article>
  </div>
</body>
</html>
