<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web Agent Home</title>
  <style>
    :root {
      --bg: #eef3fb;
      --card: #ffffff;
      --line: #cbd5e1;
      --text: #0f172a;
      --sub: #475569;
      --btn: #2563eb;
      --ok: #059669;
      --warn: #b45309;
      --err: #dc2626;
      --muted: #64748b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", sans-serif; }
    .page { max-width: 1440px; height: 100vh; margin: 0 auto; padding: 14px; display: grid; gap: 12px; grid-template-columns: 520px 1fr; overflow: hidden; }
    .page > div { min-height: 0; overflow: auto; display:flex; flex-direction:column; gap:12px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
    .head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom: 8px; }
    .title { font-size: 19px; font-weight: 800; }
    .sub { color: var(--sub); font-size: 13px; }
    label { display:block; margin:8px 0 4px; color: var(--sub); font-size: 13px; }
    input, select, textarea, button { width:100%; border-radius:8px; border:1px solid var(--line); padding:8px 10px; font-size:14px; }
    textarea { min-height: 86px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    button { cursor:pointer; border: none; font-weight:700; color:#fff; background: var(--btn); }
    button.ok { background: var(--ok); }
    button.warn { background: var(--warn); }
    button.err { background: var(--err); }
    button.muted { background: var(--muted); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap:8px; }
    .row3 { display:grid; grid-template-columns: repeat(3,1fr); gap:8px; }
    .checkline { display:flex; align-items:center; gap:8px; margin-top:8px; color:#334155; font-size:13px; font-weight:700; }
    .checkline input[type="checkbox"] { width:16px; height:16px; accent-color:#2563eb; cursor:pointer; }
    .btn-row-center-2 { display:flex; justify-content:center; align-items:center; gap:12px; margin: 8px auto 0; }
    .btn-row-center-2 button {
      width:auto;
      min-width:140px;
      padding:6px 14px;
      font-size:12px;
      border-radius:6px;
    }
    .btn-center-single { display:flex; justify-content:center; margin-top:8px; gap:10px; }
    .btn-center-single button { width:auto; min-width:180px; padding-left:24px; padding-right:24px; }
    .info-grid { display:grid; grid-template-columns: 1fr; gap:8px; }
    .info-grid-2 { display:grid; grid-template-columns: 1fr 2fr; gap:8px; }
    .info-item { border:1px solid var(--line); border-radius:10px; background:#f8fbff; padding:8px 10px; min-height:44px; }
    .info-label { color:#64748b; font-size:12px; margin-bottom:2px; }
    .info-value { color:#0f172a; font-size:14px; font-weight:700; word-break:break-all; }
    .tag { display:inline-block; border:1px solid var(--line); border-radius:999px; padding: 2px 10px; color: var(--sub); font-size: 12px; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; }
    .section-strong-title { color:#0f172a; font-size:15px; font-weight:800; margin-top:10px; margin-bottom:6px; }
    .arg-box { border:1px solid var(--line); border-radius:10px; padding:8px; background:#f8fbff; }
    .opt-row {
      display:grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 44px;
      gap:6px;
      align-items:center;
      margin-bottom:6px;
    }
    .opt-row > * { min-width: 0; }
    .opt-row:last-child { margin-bottom:0; }
    .opt-row textarea { min-height:40px; max-height:120px; }
    .opt-row button { width:44px; min-width:44px; padding:0; }
    .empty-note {
      border: 1px dashed #c8d4e3;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: #64748b;
      background: #f8fbff;
      line-height: 1.4;
    }
    .upload-list { margin-top:8px; border:1px solid var(--line); border-radius:10px; background:#f8fbff; padding:8px; font-size:12px; color:#334155; }
    .upload-row { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:4px 0; border-bottom:1px dashed #d7e0ee; }
    .upload-row:last-child { border-bottom:none; }
    .upload-row .name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:70%; }
    .upload-row .size { color:#64748b; white-space:nowrap; }
    .upload-row .del { width:auto; border:none; background:#64748b; color:#fff; border-radius:6px; padding:2px 8px; font-size:12px; cursor:pointer; }
    pre { margin:0; border:1px solid var(--line); background:#f8fbff; border-radius:8px; padding:8px; font-size:12px; line-height:1.45; white-space:pre-wrap; word-break:break-word; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    #historyPre { min-height: 280px; max-height: 62vh; overflow: auto; }
    #summaryPre { min-height: 160px; max-height: 36vh; overflow: auto; }
    .busy-mask {
      position: fixed; inset:0; z-index: 9999; display:none; align-items:center; justify-content:center;
      background: rgba(15,23,42,0.28);
    }
    .busy-mask.show { display:flex; }
    .busy-card { min-width:260px; max-width:min(90vw,560px); background:#fff; border:1px solid #cbd5e1; border-radius:12px; box-shadow:0 10px 30px rgba(15,23,42,.18); padding:14px 16px; }
    .busy-title { font-weight:800; margin-bottom:4px; }
    .busy-text { color:#334155; font-size:13px; white-space:pre-wrap; }
    @media (max-width: 1120px) {
      html, body { overflow: auto; }
      .page { height: auto; min-height: 100vh; grid-template-columns: 1fr; overflow: visible; }
      .page > div { overflow: visible; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div>
      <div class="card">
        <div class="head">
          <div>
            <div class="title">Web Agent Home</div>
          </div>
        </div>

        <label>默认 Profile</label>
        <input value="web_agent_home（自动创建/复用，无需手动启动）" readonly>

        <label>系统连接（可选）</label>
        <div id="loginLoggedOutPanel">
          <div class="sub" style="margin-bottom:6px;">登录后可使用系统侧 AI 与云能力</div>
          <div class="row">
            <input id="loginEmailInput" placeholder="邮箱（例如 you@example.com）">
            <input id="loginPwdInput" type="password" placeholder="密码">
          </div>
          <div class="row3" style="margin-top:8px;">
            <button id="loginBtn" class="ok" type="button">登录系统</button>
            <button id="checkLoginBtn" class="muted" type="button">检查登录</button>
            <div></div>
          </div>
        </div>

        <div id="loginLoggedInPanel" style="display:none;">
          <div class="sub" style="margin-bottom:6px;">已连接系统能力</div>
          <div class="info-grid">
            <div class="info-item">
              <div class="info-label">Email</div>
              <div id="loginUserEmailView" class="info-value">-</div>
            </div>
            <div class="info-grid-2">
              <div class="info-item">
                <div class="info-label">User ID</div>
                <div id="loginUserIdView" class="info-value">-</div>
              </div>
              <div class="info-item">
                <div class="info-label">余额</div>
                <div id="loginCoinsPointsView" class="info-value">-</div>
              </div>
            </div>
          </div>
          <div class="btn-row-center-2">
            <button id="checkLoginBtn2" class="muted" type="button">刷新状态</button>
            <button id="logoutBtn" class="muted" type="button">登出</button>
          </div>
        </div>
        <div id="systemLoginText" class="sub" style="margin-top:6px;">未登录</div>
      </div>

      <div class="card">
        <div class="head"><div style="font-weight:800;">任务描述：</div></div>
        <textarea id="goalInput" placeholder="例如：打开 Google，搜索 OpenAI，读前三条结果标题"></textarea>
        <label>任务附件（可选，用于上传图片/文件）</label>
        <input id="attachFilesInput" type="file" multiple>
        <div class="row3" style="margin-top:8px;">
          <button id="uploadFilesBtn" class="muted" type="button">上传选中文件</button>
          <button id="clearUploadedBtn" class="muted" type="button">清空已上传</button>
          <div></div>
        </div>
        <div id="attachmentsBox" class="upload-list">暂无附件</div>
        <details style="margin-top:8px;">
          <summary style="cursor:pointer;color:#475569;font-weight:700;">高级选项（可选）</summary>
          <div class="row3" style="margin-top:6px;">
            <div>
              <label>模型档位</label>
              <select id="modelInput">
                <option value="advanced" selected>advanced</option>
                <option value="quality">quality</option>
                <option value="balanced">balanced</option>
                <option value="fast">fast</option>
              </select>
            </div>
            <div>
              <label>maxSteps</label>
              <input id="maxStepsInput" type="number" min="1" max="200" value="20">
            </div>
            <div>
              <label>aiTimeoutMs</label>
              <input id="aiTimeoutInput" type="number" min="3000" max="180000" value="60000">
            </div>
          </div>
          <div class="row" style="margin-top:6px;">
            <div>
              <label>执行策略</label>
              <select id="invokeStrategyInput">
                <option value="auto" selected>auto（默认，优先 invoke）</option>
                <option value="preferInvoke">preferInvoke（更强偏向 invoke）</option>
                <option value="invokeOnly">invokeOnly（仅 invoke 主路径）</option>
                <option value="noInvoke">noInvoke（禁止 invoke + 脚本动作）</option>
              </select>
            </div>
            <div></div>
          </div>
          <label class="checkline"><input id="autoCloseOpenedPagesInput" type="checkbox" checked>执行后自动关闭本任务新开的页面</label>
          <label class="section-strong-title">Opts（逐项编辑，支持点号嵌套键）</label>
          <div class="row3" style="margin-top:0;">
            <button id="addOptRowBtn" class="muted" type="button">+ 添加项</button>
            <button id="parseOptsJsonBtn" class="muted" type="button">从JSON解析</button>
            <button id="clearOptRowsBtn" class="muted" type="button">清空项</button>
          </div>
          <div id="optsEditorBox" class="arg-box" style="margin-top:8px;overflow-x:hidden;">暂无 opts 项，可点击“+ 添加项”</div>
          <label>opts(JSON 预览/高级编辑)</label>
          <textarea id="optsInput">{}</textarea>
        </details>
        <div class="btn-center-single">
          <button id="runGoalBtn" class="ok" type="button">执行任务</button>
          <button id="stopRunBtn" class="muted" type="button" disabled>停止执行</button>
        </div>
      </div>

      <div class="card">
        <div class="head"><div style="font-weight:800;">更多功能</div></div>
        <div class="row3">
          <button id="openRunnerBtn" class="muted" type="button">执行 Flow</button>
          <button id="openConfigBtn" class="muted" type="button">系统设置</button>
          <button id="openBuilderBtn" class="muted" type="button">开发 Flow</button>
        </div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="head"><div style="font-weight:800;">任务回答</div></div>
        <pre id="answerPre">请输入任务描述后点击“执行任务”。</pre>
      </div>
      <div class="card">
        <div class="head"><div style="font-weight:800;">执行摘要</div></div>
        <pre id="summaryPre">暂无执行结果</pre>
      </div>
      <div class="card">
        <div class="head"><div style="font-weight:800;">步骤历史</div><button id="refreshRunBtn" class="muted" type="button" style="width:auto;padding:6px 10px;">刷新</button></div>
        <pre id="historyPre">暂无历史</pre>
      </div>
    </div>
  </div>
  <datalist id="optsKeyOptions"></datalist>

  <div id="busyMask" class="busy-mask" aria-live="polite" aria-busy="false">
    <div class="busy-card">
      <div class="busy-title">请稍候</div>
      <div id="busyText" class="busy-text">正在处理...</div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const DEFAULT_ALIAS = "web_agent_home";
    const DEFAULT_LAUNCH_MODE = "direct";
    const DEFAULT_START_URL = "about:blank";
    const HOME_SETTINGS_KEY = "rpaflows.home.settings.v1";
    const OPT_KEY_SUGGESTIONS = [
      "silent",
      "continueOnError",
      "maxSteps",
      "stepTimeoutMs",
      "actionTimeoutMs",
      "riskControl.mode",
      "riskControl.maxLevel",
      "riskControl.askEnabled",
      "flowSourcePolicy",
      "ai.provider",
      "ai.model",
      "ai.timeoutMs",
      "systemAuth.userId",
      "systemAuth.token",
      "systemAuth.apiPath",
      "queryCache.enabled",
      "queryCache.maxEntries",
    ];
    const OPT_VALUE_SUGGESTIONS = {
      flowsourcepolicy: ["prefer_local", "prefer_cloud", "local", "cloud", "merge"],
      "riskcontrol.mode": ["warn", "ask", "block", "off"],
      "riskcontrol.onaskunavailable": ["block", "warn", "allow"],
      "riskcontrol.enabled": ["true", "false"],
      "riskcontrol.askenabled": ["true", "false"],
      "querycache.enabled": ["true", "false"],
      silent: ["true", "false"],
      continueonerror: ["true", "false"],
    };
    const OPT_VALUE_DEFAULTS = {
      flowsourcepolicy: "prefer_local",
    };
    const state = {
      sessionId: "",
      runId: "",
      runMode: "",
      running: false,
      currentPhase: "",
      runStartedAtMs: 0,
      pollTimer: 0,
      busyCount: 0,
      loginDone: false,
      localLogin: null,
      autoLoginTried: false,
      loginView: null,
      optRows: [],
      uploadedFiles: [],
    };

    function asText(v){ return String(v == null ? "" : v).trim(); }
    function sleep(ms){ return new Promise((resolve)=>setTimeout(resolve, Math.max(0, Number(ms || 0)))); }
    function setStatus(v){ try { console.log("[home]", String(v || "-")); } catch (_) {} }
    function parseJson(txt, fallback = {}) { const s = asText(txt); if(!s) return fallback; return JSON.parse(s); }
    function formatBytes(v) {
      const n = Number(v || 0);
      if (!Number.isFinite(n) || n <= 0) return "0B";
      if (n < 1024) return `${Math.round(n)}B`;
      if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)}KB`;
      if (n < 1024 * 1024 * 1024) return `${(n / (1024 * 1024)).toFixed(1)}MB`;
      return `${(n / (1024 * 1024 * 1024)).toFixed(1)}GB`;
    }
    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        try {
          const fr = new FileReader();
          fr.onerror = () => reject(new Error("读取文件失败"));
          fr.onload = () => resolve(String(fr.result || ""));
          fr.readAsDataURL(file);
        } catch (e) {
          reject(e);
        }
      });
    }
    function renderUploadedFiles() {
      const box = $("attachmentsBox");
      if (!box) return;
      const rows = Array.isArray(state.uploadedFiles) ? state.uploadedFiles : [];
      if (!rows.length) {
        box.textContent = "暂无附件";
        return;
      }
      box.innerHTML = rows.map((one, idx) => {
        const name = asText(one?.name || `file_${idx + 1}`);
        const size = formatBytes(one?.size || 0);
        return `<div class="upload-row"><span class="name">${name}</span><span class="size">${size}</span><button class="del" data-del-upload="${idx}" type="button">删</button></div>`;
      }).join("");
    }
    function normalizeInvokeStrategy(v) {
      const s = asText(v || "auto").toLowerCase();
      if (s === "preferinvoke" || s === "prefer_invoke") return "preferInvoke";
      if (s === "invokeonly" || s === "invoke_only") return "invokeOnly";
      if (s === "noinvoke" || s === "no_invoke" || s === "forbidinvoke" || s === "disableinvoke") return "noInvoke";
      return "auto";
    }
    function resolveGoalScopesByStrategy(raw) {
      const strategy = normalizeInvokeStrategy(raw);
      if (strategy === "invokeOnly") {
        return {
          strategy,
          actionScope: ["goto", "invoke", "wait", "ask_assist", "done", "abort"],
          invokeScope: "all",
        };
      }
      if (strategy === "noInvoke") {
        return {
          strategy,
          actionScope: ["goto", "click", "hover", "input", "press_key", "wait", "scroll", "readElement", "ask_assist", "done", "abort"],
          invokeScope: "all",
        };
      }
      return {
        strategy,
        actionScope: ["goto", "click", "hover", "input", "press_key", "wait", "scroll", "invoke", "ask_assist", "done", "abort"],
        invokeScope: "all",
      };
    }
    function getByPath(obj, dottedPath) {
      const root = (obj && typeof obj === "object") ? obj : {};
      const keys = String(dottedPath || "").split(".").map((x) => String(x || "").trim()).filter(Boolean);
      let cur = root;
      for (const k of keys) {
        if (!cur || typeof cur !== "object" || !(k in cur)) return undefined;
        cur = cur[k];
      }
      return cur;
    }
    function setByPath(obj, dottedPath, value) {
      const keys = String(dottedPath || "").split(".").map((x) => String(x || "").trim()).filter(Boolean);
      if (!keys.length) return;
      let cur = obj;
      for (let i = 0; i < keys.length - 1; i += 1) {
        const k = keys[i];
        if (!cur[k] || typeof cur[k] !== "object" || Array.isArray(cur[k])) cur[k] = {};
        cur = cur[k];
      }
      cur[keys[keys.length - 1]] = value;
    }
    function flattenObjectToRows(input, prefix = "", out = []) {
      const src = (input && typeof input === "object" && !Array.isArray(input)) ? input : {};
      const keys = Object.keys(src);
      for (const key of keys) {
        const path = prefix ? `${prefix}.${key}` : key;
        const val = src[key];
        if (val && typeof val === "object" && !Array.isArray(val)) {
          flattenObjectToRows(val, path, out);
          continue;
        }
        let text = "";
        if (val === null) text = "null";
        else if (typeof val === "boolean") text = val ? "true" : "false";
        else if (typeof val === "number") text = String(val);
        else if (typeof val === "string") text = String(val);
        else text = JSON.stringify(val);
        out.push({ key: path, value: text });
      }
      return out;
    }
    function normalizeOptKey(key) { return String(key || "").trim().replace(/\s+/g, ""); }
    function normalizeSuggestedOptValue(text) {
      const raw = String(text == null ? "" : text).trim();
      if (!raw) return "";
      if ((raw.startsWith('"') && raw.endsWith('"')) || (raw.startsWith("'") && raw.endsWith("'"))) {
        try {
          const parsed = JSON.parse(raw.replace(/^'/, '"').replace(/'$/, '"'));
          if (typeof parsed === "string") return parsed;
        } catch (_) {}
      }
      return raw;
    }
    function getOptValueSuggestionsByKey(key) {
      const k = normalizeOptKey(key || "").toLowerCase();
      return Array.isArray(OPT_VALUE_SUGGESTIONS[k]) ? OPT_VALUE_SUGGESTIONS[k] : null;
    }
    function getOptDefaultValueByKey(key, suggestions = null) {
      const k = normalizeOptKey(key || "").toLowerCase();
      const explicit = String(OPT_VALUE_DEFAULTS[k] || "").trim();
      if (explicit) return explicit;
      if (Array.isArray(suggestions) && suggestions.length) return String(suggestions[0] || "").trim();
      return "";
    }
    function parseOptValue(text) {
      const raw = String(text == null ? "" : text);
      const s = raw.trim();
      if (!s) return "";
      try { return JSON.parse(s); } catch (_) {}
      return raw;
    }
    function collectOptsFromEditor() {
      const out = {};
      const keyEls = Array.from(document.querySelectorAll("[data-opt-key-idx]"));
      for (let i = 0; i < keyEls.length; i += 1) {
        const keyEl = document.querySelector(`[data-opt-key-idx="${i}"]`);
        const valEl = document.querySelector(`[data-opt-value-idx="${i}"]`);
        const key = normalizeOptKey(keyEl?.value || "");
        if (!key) continue;
        const valueText = String(valEl?.value || "");
        const value = parseOptValue(valueText);
        setByPath(out, key, value);
      }
      return out;
    }
    function syncOptRowsStateFromDom() {
      const nextRows = [];
      const keyEls = Array.from(document.querySelectorAll("[data-opt-key-idx]"));
      for (let i = 0; i < keyEls.length; i += 1) {
        const keyEl = document.querySelector(`[data-opt-key-idx="${i}"]`);
        const valEl = document.querySelector(`[data-opt-value-idx="${i}"]`);
        const key = normalizeOptKey(keyEl?.value || "");
        const value = String(valEl?.value || "");
        if (!key && !value.trim()) continue;
        nextRows.push({ key, value });
      }
      state.optRows = nextRows;
    }
    function renderOptsKeyDatalist() {
      const dl = $("optsKeyOptions");
      if (!dl) return;
      dl.innerHTML = "";
      const set = new Set(OPT_KEY_SUGGESTIONS);
      for (const one of state.optRows) {
        const k = normalizeOptKey(one?.key || "");
        if (k) set.add(k);
      }
      document.querySelectorAll("[data-opt-key-idx]").forEach((el) => {
        const k = normalizeOptKey(el?.value || "");
        if (k) set.add(k);
      });
      for (const key of Array.from(set).sort((a, b) => a.localeCompare(b))) {
        const op = document.createElement("option");
        op.value = key;
        dl.appendChild(op);
      }
    }
    function saveHomeSettings() {
      let opts = {};
      try { opts = collectOptsFromEditor(); } catch (_) { opts = parseJson($("optsInput")?.value || "{}", {}); }
      const payload = {
        model: asText($("modelInput")?.value || "advanced"),
        maxSteps: Number($("maxStepsInput")?.value || 20),
        aiTimeoutMs: Number($("aiTimeoutInput")?.value || 60000),
        invokeStrategy: normalizeInvokeStrategy($("invokeStrategyInput")?.value || "auto"),
        autoCloseOpenedPages: $("autoCloseOpenedPagesInput")?.checked !== false,
        opts,
      };
      try { localStorage.setItem(HOME_SETTINGS_KEY, JSON.stringify(payload)); } catch (_) {}
    }
    function refreshOptsJsonFromEditor() {
      try {
        const opts = collectOptsFromEditor();
        $("optsInput").value = JSON.stringify(opts, null, 2);
        renderOptsKeyDatalist();
        saveHomeSettings();
      } catch (_) {}
    }
    function renderOptsEditorFromRows() {
      const box = $("optsEditorBox");
      if (!box) return;
      box.innerHTML = "";
      if (!state.optRows.length) {
        box.innerHTML = '<div class="empty-note">暂无 opts 项，可点击“+ 添加项”</div>';
        renderOptsKeyDatalist();
        return;
      }
      state.optRows.forEach((row, idx) => {
        const wrap = document.createElement("div");
        wrap.className = "opt-row";

        const keyInput = document.createElement("input");
        keyInput.placeholder = "key，例如 riskControl.mode";
        keyInput.value = String(row?.key || "");
        keyInput.setAttribute("list", "optsKeyOptions");
        keyInput.dataset.optKeyIdx = String(idx);
        const valueSuggestions = getOptValueSuggestionsByKey(keyInput.value);
        const rowValueText = String(row?.value || "");
        const normalizedValueText = normalizeSuggestedOptValue(rowValueText);
        keyInput.addEventListener("input", () => {
          const oldHasSuggest = !!getOptValueSuggestionsByKey(row?.key || "");
          row.key = String(keyInput.value || "");
          const newHasSuggest = !!getOptValueSuggestionsByKey(keyInput.value);
          if (oldHasSuggest !== newHasSuggest) {
            syncOptRowsStateFromDom();
            renderOptsEditorFromRows();
          }
          refreshOptsJsonFromEditor();
        });
        wrap.appendChild(keyInput);

        let valInput = null;
        if (valueSuggestions && valueSuggestions.length) {
          const sel = document.createElement("select");
          const defaultValue = getOptDefaultValueByKey(keyInput.value, valueSuggestions);
          const placeholder = document.createElement("option");
          placeholder.value = "";
          placeholder.textContent = "请选择（可留空）";
          sel.appendChild(placeholder);
          for (const one of valueSuggestions) {
            const op = document.createElement("option");
            op.value = String(one);
            op.textContent = String(one) === defaultValue ? `${String(one)}（默认）` : String(one);
            sel.appendChild(op);
          }
          if (normalizedValueText && !valueSuggestions.includes(normalizedValueText)) {
            const custom = document.createElement("option");
            custom.value = normalizedValueText;
            custom.textContent = `${normalizedValueText}（custom）`;
            sel.appendChild(custom);
          }
          sel.value = normalizedValueText;
          sel.dataset.optValueIdx = String(idx);
          sel.addEventListener("input", () => refreshOptsJsonFromEditor());
          sel.addEventListener("change", () => refreshOptsJsonFromEditor());
          valInput = sel;
        } else {
          const ta = document.createElement("textarea");
          ta.placeholder = "value（JSON 或文本）";
          ta.value = rowValueText;
          ta.dataset.optValueIdx = String(idx);
          ta.addEventListener("input", () => refreshOptsJsonFromEditor());
          valInput = ta;
        }
        wrap.appendChild(valInput);

        const delBtn = document.createElement("button");
        delBtn.type = "button";
        delBtn.className = "err";
        delBtn.textContent = "删";
        delBtn.addEventListener("click", () => {
          syncOptRowsStateFromDom();
          state.optRows.splice(idx, 1);
          renderOptsEditorFromRows();
          refreshOptsJsonFromEditor();
        });
        wrap.appendChild(delBtn);
        box.appendChild(wrap);
      });
      renderOptsKeyDatalist();
    }

    async function api(method, path, body){
      const init = { method, headers: { "content-type": "application/json" } };
      if(body !== undefined) init.body = JSON.stringify(body);
      const res = await fetch(path, init);
      const data = await res.json();
      if(!res.ok || !data.ok) throw new Error(data.reason || `HTTP ${res.status}`);
      return data.data;
    }

    function setAnswerPlaceholderByState(data = null){
      const p = $("answerPre");
      if (!p) return;
      const hasRun = !!asText(state.runId || "");
      const goal = asText($("goalInput")?.value || "");
      if (!hasRun) {
        p.textContent = goal
          ? "任务尚未开始，点击“执行任务”后会在这里展示最终回答。"
          : "请输入任务描述后点击“执行任务”。";
        return;
      }
      const running = !!(data && data.running === true);
      if (running) {
        const phase = asText(data?.currentPhase || state.currentPhase || "");
        const phaseLabelMap = {
          decide: "AI 规划",
          plan: "AI 规划",
          execute: "执行步骤",
          action: "执行步骤",
          done: "收尾整理",
        };
        const phaseLabel = phaseLabelMap[phase] || (phase ? phase : "处理中");
        const startedAtMs = Number(data?.startedAtMs || state.runStartedAtMs || 0);
        const elapsedSec = startedAtMs > 0 ? Math.max(0, Math.floor((Date.now() - startedAtMs) / 1000)) : 0;
        const hints = (phase === "decide" || phase === "plan")
          ? [
            "AI 正在理解你的任务并规划下一步动作。",
            "正在评估页面状态和可执行路径，请稍候。",
            "复杂任务通常会多轮推理后再执行。",
          ]
          : [

            "如果页面较慢或有重定向，耗时会略长。",
            "执行完成后会自动汇总回答。",
          ];
        const hint = hints[elapsedSec % hints.length];
        p.textContent = `任务执行中（${phaseLabel}，已用时 ${elapsedSec}s）\n${hint}`;
      }
    }

    function formatUsd(usd) {
      const n = Number(usd);
      if (!Number.isFinite(n) || n <= 0) return "";
      if (n < 0.000001) return `$${n.toExponential(2)}`;
      if (n < 0.01) return `$${n.toFixed(6).replace(/0+$/, "").replace(/\.$/, "")}`;
      return `$${n.toFixed(4).replace(/0+$/, "").replace(/\.$/, "")}`;
    }

    function detectAiProvider(summary = {}, optsHint = {}) {
      const s = (summary && typeof summary === "object") ? summary : {};
      const runMeta = (s.runMeta && typeof s.runMeta === "object") ? s.runMeta : {};
      const ai = (s.ai && typeof s.ai === "object") ? s.ai : {};
      const hint = (optsHint && typeof optsHint === "object") ? optsHint : {};
      return asText(
        ai.provider
        || runMeta.aiProvider
        || runMeta.provider
        || runMeta?.ai?.provider
        || hint?.ai?.provider
        || ""
      ).toLowerCase();
    }

    function buildAiUsageBanner(summary = {}, optsHint = {}) {
      const s = (summary && typeof summary === "object") ? summary : {};
      const ai = (s.ai && typeof s.ai === "object") ? s.ai : {};
      const calls = Number(ai.calls || 0);
      const promptTokens = Number(ai.promptTokens || 0);
      const completionTokens = Number(ai.completionTokens || 0);
      const totalTokens = Number(ai.totalTokens || 0);
      const costUsd = Number(ai.costUsd || 0);
      const provider = detectAiProvider(s, optsHint);
      if (!(calls > 0 || promptTokens > 0 || completionTokens > 0 || totalTokens > 0 || costUsd > 0 || provider)) return "";

      let primary = "";
      if (provider === "openrouter" && costUsd > 0) primary = `cost=${formatUsd(costUsd)}`;
      else if (costUsd > 0) primary = `cost=${formatUsd(costUsd)}`;
      else if (totalTokens > 0) primary = `tokens=${Math.round(totalTokens)}`;
      else if (calls > 0) primary = `calls=${Math.round(calls)}`;
      else primary = "usage=unknown";

      const extras = [];
      if (calls > 0) extras.push(`calls=${Math.round(calls)}`);
      if (promptTokens > 0) extras.push(`prompt=${Math.round(promptTokens)}`);
      if (completionTokens > 0) extras.push(`completion=${Math.round(completionTokens)}`);
      if (totalTokens > 0) extras.push(`total=${Math.round(totalTokens)}`);
      if (provider) extras.push(`provider=${provider}`);
      return `AI 统计: ${primary}${extras.length ? ` | ${extras.join(" | ")}` : ""}`;
    }

    function stopPolling(){ if(state.pollTimer){ clearInterval(state.pollTimer); state.pollTimer = 0; } }
    function startPolling(){ stopPolling(); state.pollTimer = setInterval(()=>refreshRunStatus().catch((e)=>{ setStatus(`轮询失败: ${String(e?.message || e)}`); stopPolling(); }), 1000); }

    function renderStatus(data, mode){
      const summary = (data && typeof data.summary === "object") ? data.summary : {};
      let optsHint = {};
      try { optsHint = parseJson($("optsInput")?.value || "{}", {}); } catch (_) { optsHint = {}; }
      const running = data?.running === true;
      if (running) setAnswerPlaceholderByState(data);
      const summaryStatus = asText(summary?.status || "");
      const summaryReason = asText(summary?.reason || "");
      const summaryValue = summary?.value;
      const toInlineText = (v) => {
        if (v == null) return "";
        if (typeof v === "string") return asText(v);
        if (typeof v === "number" || typeof v === "boolean") return String(v);
        return "";
      };
      const makeItemsAnswer = (arr) => {
        if (!Array.isArray(arr) || !arr.length) return "";
        const lines = [];
        const top = arr.slice(0, 5);
        for (let i = 0; i < top.length; i += 1) {
          const one = (top[i] && typeof top[i] === "object") ? top[i] : {};
          const title = asText(one.title || one.name || one.text || "");
          const url = asText(one.url || one.href || "");
          const summ = asText(one.summary || "");
          if (title && url) lines.push(`${i + 1}. ${title}\n   ${url}`);
          else if (title) lines.push(`${i + 1}. ${title}`);
          else if (url) lines.push(`${i + 1}. ${url}`);
          else if (summ) lines.push(`${i + 1}. ${summ}`);
        }
        if (!lines.length) return "";
        return `已找到 ${arr.length} 条结果：\n${lines.join("\n")}`;
      };
      const extractAnswer = (value, depth = 0) => {
        if (depth > 4) return "";
        const t = toInlineText(value);
        if (t) return t;
        if (!value || typeof value !== "object") return "";
        if (Array.isArray(value)) return makeItemsAnswer(value);
        const obj = value;
        if (obj.status && obj.value !== undefined && typeof obj.status === "string") {
          const nested = extractAnswer(obj.value, depth + 1);
          if (nested) return nested;
        }
        for (const key of ["answer", "finalAnswer", "conclusion", "summary", "text", "message", "result"]) {
          const nested = extractAnswer(obj[key], depth + 1);
          if (nested) return nested;
        }
        if (Array.isArray(obj.items)) {
          const got = makeItemsAnswer(obj.items);
          if (got) return got;
        }
        return "";
      };
      let answerText = extractAnswer(summaryValue);
      if (!answerText && summaryStatus === "done") {
        answerText = "任务执行完成，但未返回明确的自然语言回答。可在“执行摘要/步骤历史”查看详细结果。";
      }
      if (!answerText) {
        answerText = summaryReason ? `任务未完成：${summaryReason}` : "暂无回答";
      }
      if (!running) {
        $("answerPre").textContent = answerText;
      }
      const aiBanner = buildAiUsageBanner(summary, optsHint);
      const summaryJson = JSON.stringify(summary, null, 2);
      $("summaryPre").textContent = aiBanner ? `${aiBanner}\n\n${summaryJson}` : summaryJson;
      const lines = [];
      if(mode === "goal"){
        const hs = Array.isArray(summary.history) ? summary.history : [];
        hs.forEach((one)=>{
          lines.push(`#${Number(one?.index || 0)} ${asText(one?.stepId || "-")} (${asText(one?.actionType || "-")}) => ${asText(one?.status || "-")}`);
          if(one?.summary) lines.push(`  summary: ${asText(one.summary)}`);
          if(one?.reason) lines.push(`  reason: ${asText(one.reason)}`);
          lines.push("");
        });
      } else {
        const hs = Array.isArray(summary.steps) ? summary.steps : [];
        hs.forEach((one, idx)=>{
          lines.push(`#${idx+1} ${asText(one?.stepId || "-")} (${asText(one?.actionType || "-")}) => ${asText(one?.status || "-")} (${Number(one?.elapsedMs || 0)}ms)`);
          if(one?.reason) lines.push(`  reason: ${asText(one.reason)}`);
          lines.push("");
        });
      }
      $("historyPre").textContent = lines.length ? lines.join("\n").trim() : "暂无历史";
    }

        startUrl: DEFAULT_START_URL,

    function isAboutBlankUrl(url){
      const u = asText(url).toLowerCase();
      return u === "about:blank" || u.startsWith("about:blank#");
    }

    async function ensureBlankStartPage(){
      await ensureSession();
      const data = await api("GET", `/rpaflows/api/builder/session/${encodeURIComponent(state.sessionId)}/contexts`);
      const rows = Array.isArray(data?.contexts) ? data.contexts : [];
      const activeId = asText(data?.activeContextId || "");

      const activeUrl = asText(active?.url || "");

      el.style.color = ok ? "#059669" : "#475569";

    function applyLoginUi(view){

      const done = !!v.done;
      $("loginLoggedOutPanel").style.display = done ? "none" : "";
      $("loginLoggedInPanel").style.display = done ? "" : "none";
      if (done) {
        $("loginUserEmailView").textContent = asText(v.email || "-");
        $("loginUserIdView").textContent = asText(v.userId || "-");

    function normalizeLocalLoginVO(obj, keyName = ""){
      if(!obj || typeof obj !== "object") return null;
      const userId = asText(obj.userId || obj.userid || "");
      const token = asText(obj.token || "");
      if(!userId || !token) return null;
      return {
        sourceKey: asText(keyName || ""),
        userId,
        token,
        email: asText(obj.email || ""),
        name: asText(obj.name || obj.nick || ""),
        apiPath: asText(obj.apiPath || ""),
        tokenExpire: Number(obj.tokenExpire || obj.tokenExipre || 0),
      };
    }

    function readLocalLoginInfoCompat(){
      const keys = ["LoginVO", "login-Info", "loginInfo", "login_vo"];
      for (const key of keys){
        let raw = "";
        try { raw = String(localStorage.getItem(key) || "").trim(); } catch (_) { raw = ""; }
        if(!raw) continue;
        try {
          const obj = JSON.parse(raw);
          const norm = normalizeLocalLoginVO(obj, key);
          if(norm) return norm;
        } catch (_) {
        }
      }
      return null;
    }

    function saveLocalLoginInfoCompat(vo){
      const norm = normalizeLocalLoginVO(vo || {}, "LoginVO");
      if(!norm) return;
      const payload = {
        code: 200,
        userId: norm.userId,
        userid: norm.userId,
        token: norm.token,
        email: asText(vo?.email || norm.email || ""),
        name: asText(vo?.name || vo?.nick || norm.name || ""),
        apiPath: asText(vo?.apiPath || norm.apiPath || "/ws/"),
        tokenExpire: Number(vo?.tokenExpire || vo?.tokenExipre || 0),
        tokenExipre: Number(vo?.tokenExpire || vo?.tokenExipre || 0),
        points: Number(vo?.points || 0),
        coins: Number(vo?.coins || 0),
        rank: asText(vo?.rank || ""),
      };
      const text = JSON.stringify(payload);
      try { localStorage.setItem("LoginVO", text); } catch (_) {}
      try { localStorage.setItem("login-Info", text); } catch (_) {}
      try { localStorage.setItem("loginInfo", text); } catch (_) {}
      if (payload.email) {
        try { localStorage.setItem("LastAccount", payload.email); } catch (_) {}
      }
    }

    function clearLocalLoginInfoCompat(){
      for (const k of ["LoginVO", "login-Info", "loginInfo", "login_vo"]) {
        try { localStorage.removeItem(k); } catch (_) {}
      }
    }

    function formatSystemLoginText(payload){
      const p = (payload && typeof payload === "object") ? payload : {};
      const done = !!(p.loginDone || p?.systemAuth?.loginDone);
      const info = asText(p.info || "");
      const vo = (p.systemAuth && p.systemAuth.loginVO && typeof p.systemAuth.loginVO === "object")
        ? p.systemAuth.loginVO
        : null;
      const userId = asText(vo?.userId || vo?.userid || "");
      const email = asText(vo?.email || "");
      const coins = Number(vo?.coins || 0);
      const points = Number(vo?.points || 0);
      const tail = [];
      if (Number.isFinite(coins) && coins > 0) tail.push(`coins=${coins}`);
      if (Number.isFinite(points) && points > 0) tail.push(`points=${points}`);
      const extra = tail.length ? `，${tail.join("，")}` : "";
      return {
        done,
        text: `${done ? "已登录" : "未登录"}${info ? `（${info}）` : ""}${extra}`,
        userId,
        email,
        coins,
        points,
      };
    }

    async function loginSystem(){
      await ensureSession();
      const email = asText($("loginEmailInput").value);
      const password = String($("loginPwdInput").value || "");
      if(!email || !password) throw new Error("请填写邮箱和密码");
      const data = await api("POST", `/rpaflows/api/builder/session/${encodeURIComponent(state.sessionId)}/system/login`, {
        email,
        password,
      });
      const view = formatSystemLoginText(data);
      state.loginView = view;
      state.loginDone = view.done;
      setSystemLoginText(view.text, view.done);
      applyLoginUi(view);
      if (data?.systemAuth?.loginVO) {
        saveLocalLoginInfoCompat(data.systemAuth.loginVO);
        state.localLogin = normalizeLocalLoginVO(data.systemAuth.loginVO, "LoginVO");
      }
      // 登录后自动检查一次，确保拉取最新 points/coins 并确认 token 可用。
      await checkSystemLogin();
      setStatus("系统登录完成");
    }

    async function checkSystemLogin(){
      await ensureSession();
      const data = await api("POST", `/rpaflows/api/builder/session/${encodeURIComponent(state.sessionId)}/system/check`, {
        checkNT: true,
      });
      const view = formatSystemLoginText(data);
      state.loginView = view;
      state.loginDone = view.done;
      setSystemLoginText(view.text, view.done);
      applyLoginUi(view);
      if (data?.loginDone && data?.systemAuth?.loginVO) {
        saveLocalLoginInfoCompat(data.systemAuth.loginVO);
        state.localLogin = normalizeLocalLoginVO(data.systemAuth.loginVO, "LoginVO");
      }
      setStatus("登录状态已更新");
    }

    async function logoutSystem(){
      await ensureSession();
      const data = await api("POST", `/rpaflows/api/builder/session/${encodeURIComponent(state.sessionId)}/system/logout`, {});
      state.loginDone = false;
      state.loginView = { done: false };
      state.localLogin = null;
      clearLocalLoginInfoCompat();
      applyLoginUi(state.loginView);
      setSystemLoginText(`未登录${data?.info ? `（${asText(data.info)}）` : ""}`, false);
      setStatus("已退出系统登录");
    }

    async function tryAutoLoginFromLocal(){
      if (state.autoLoginTried) return false;
      state.autoLoginTried = true;
      const saved = readLocalLoginInfoCompat();
      state.localLogin = saved;
      if (!saved) return false;
      if (saved.email) $("loginEmailInput").value = saved.email;
      if (!state.sessionId) return false;
      const data = await api("POST", `/rpaflows/api/builder/session/${encodeURIComponent(state.sessionId)}/system/login`, {
        userId: saved.userId,
        token: saved.token,
        apiPath: asText(saved.apiPath || "/ws/"),
      });
      const view = formatSystemLoginText(data);
      state.loginView = view;
      state.loginDone = view.done;
      setSystemLoginText(view.text, view.done);
      applyLoginUi(view);
      if (data?.systemAuth?.loginVO) {
        saveLocalLoginInfoCompat(data.systemAuth.loginVO);
        state.localLogin = normalizeLocalLoginVO(data.systemAuth.loginVO, "LoginVO");
      }
      if (view.done) {
        await checkSystemLogin();
        setStatus("已自动恢复系统登录");
      }
      return view.done;
    }

    async function checkLocalLoginOnBoot(){
      const saved = readLocalLoginInfoCompat();
      state.localLogin = saved;
      if (!saved) return false;
      if (saved.email) $("loginEmailInput").value = saved.email;
      const data = await api("POST", "/rpaflows/api/builder/system/check-local", {
        userId: saved.userId,
        token: saved.token,
        apiPath: asText(saved.apiPath || ""),
        email: asText(saved.email || ""),
        checkNT: true,
      });
      const view = formatSystemLoginText(data);
      state.loginView = view;
      state.loginDone = view.done;
      setSystemLoginText(view.text, view.done);
      applyLoginUi(view);
      if (view.done && data?.systemAuth?.loginVO) {
        saveLocalLoginInfoCompat(data.systemAuth.loginVO);
        state.localLogin = normalizeLocalLoginVO(data.systemAuth.loginVO, "LoginVO");
      } else if (!view.done) {
        clearLocalLoginInfoCompat();
        state.localLogin = null;
      }
      return view.done;
    }

    async function runGoal(){
      await ensureBlankStartPage();
      const goal = asText($("goalInput").value);
      if(!goal) throw new Error("请输入任务目标");
      const attachedPaths = (Array.isArray(state.uploadedFiles) ? state.uploadedFiles : [])
        .map((x) => asText(x?.path || ""))
        .filter(Boolean);
      const args = {};
      if (attachedPaths.length) {
        args.attachments = attachedPaths;
        args.files = attachedPaths;
      }
      setAnswerPlaceholderByState({ running: true, currentPhase: "decide" });
      const scopeCfg = resolveGoalScopesByStrategy($("invokeStrategyInput")?.value || "auto");
      const data = await api("POST", `/rpaflows/api/runner/session/${encodeURIComponent(state.sessionId)}/start`, {
        goal,
        notes: "",
        args,
        opts: buildOptsForRun(),
        autoCloseOpenedPages: $("autoCloseOpenedPagesInput")?.checked !== false,
        actionScope: scopeCfg.actionScope,
        invokeScope: scopeCfg.invokeScope,
        invokeStrategy: scopeCfg.strategy,
        maxSteps: Number($("maxStepsInput").value || 20),
        maxConsecutiveFails: 3,
        aiModel: asText($("modelInput").value || "advanced"),
        aiTimeoutMs: Number($("aiTimeoutInput").value || 60000),
      });
      state.runId = asText(data?.runId || "");
      state.runMode = "goal";
      state.running = true;
      state.currentPhase = "decide";
      state.runStartedAtMs = Date.now();
      updateUi();
      setStatus(`goal run started: ${state.runId}`);
      startPolling();
      await refreshRunStatus();
    }

    async function refreshRunStatus(){
      if(!state.sessionId || !state.runId) return;
      let data;
      if(state.runMode === "goal"){
        data = await api("GET", `/rpaflows/api/runner/session/${encodeURIComponent(state.sessionId)}/status?runId=${encodeURIComponent(state.runId)}`);
      } else {
        data = await api("GET", `/rpaflows/api/builder/session/${encodeURIComponent(state.sessionId)}/run-flow/status?runId=${encodeURIComponent(state.runId)}`);
      }
      renderStatus(data, state.runMode === "goal" ? "goal" : "flow");
      state.running = !!data?.running;
      state.currentPhase = asText(data?.currentPhase || "");
      if (data?.startedAt) {
        const ts = Date.parse(String(data.startedAt));
        if (Number.isFinite(ts) && ts > 0) state.runStartedAtMs = ts;
      }
      if (!state.running) state.currentPhase = "";
      setStatus(`执行状态：${asText(data?.status || "-")}（${asText(data?.currentPhase || "-")}）`);
      if(!data?.running) stopPolling();
      updateUi();
    }

    async function stopCurrentRun(){
      if(!state.sessionId || !state.runId) return;
      showBusy("正在发送停止请求...");
      try {
        if(state.runMode === "goal"){
          await api("POST", `/rpaflows/api/runner/session/${encodeURIComponent(state.sessionId)}/stop`, {
            runId: state.runId,
            reason: "stopped by user (home)",
          });
        } else {
          await api("POST", `/rpaflows/api/builder/session/${encodeURIComponent(state.sessionId)}/run-flow/stop`, {
            runId: state.runId,
            reason: "stopped by user (home)",
          });
        }
        setStatus("已发送停止请求，等待当前步骤结束...");
        const t0 = Date.now();
        while (true) {
          await refreshRunStatus();
          if (!state.running) break;
          const elapsed = Math.max(0, Math.floor((Date.now() - t0) / 1000));
          $("busyText").textContent = `已发送停止请求，等待当前步骤结束...\n通常会在当前步骤完成后停止。\n已等待 ${elapsed}s`;
          await sleep(800);
        }
        setStatus("任务已停止");
      } finally {
        hideBusy();
      }
    }

    async function uploadSelectedFiles() {
      const input = $("attachFilesInput");
      const files = Array.from(input?.files || []);
      if (!files.length) throw new Error("请先选择文件");
      await ensureSession();
      const payloadFiles = [];
      for (const f of files) {
        const data = await fileToDataUrl(f);
        payloadFiles.push({
          name: asText(f?.name || "file.bin"),
          mime: asText(f?.type || "application/octet-stream"),
          data,
        });
      }
      const ret = await api("POST", `/rpaflows/api/builder/session/${encodeURIComponent(state.sessionId)}/uploads`, {
        files: payloadFiles,
      });
      const items = Array.isArray(ret?.items) ? ret.items : [];
      const merged = [];
      const seen = new Set();
      for (const one of [...state.uploadedFiles, ...items]) {
        const p = asText(one?.path || "");
        if (!p || seen.has(p)) continue;
        seen.add(p);
        merged.push(one);
      }
      state.uploadedFiles = merged;
      renderUploadedFiles();
      setStatus(`已上传 ${items.length} 个文件（累计 ${merged.length}）`);
      if (input) input.value = "";
    }

    function clearUploadedFiles() {
      state.uploadedFiles = [];
      renderUploadedFiles();
      const input = $("attachFilesInput");
      if (input) input.value = "";
      setStatus("已清空附件");
    }
    function removeUploadedFileAt(idx) {
      const i = Number(idx);
      if (!Number.isFinite(i) || i < 0) return;
      const rows = Array.isArray(state.uploadedFiles) ? state.uploadedFiles : [];
      if (i >= rows.length) return;
      rows.splice(i, 1);
      state.uploadedFiles = rows;
      renderUploadedFiles();
      setStatus(`已移除 1 个附件（剩余 ${rows.length}）`);
    }

    $("runGoalBtn").addEventListener("click", ()=>withBusy("正在提交任务...", ()=>runGoal()).catch((e)=>setStatus(String(e?.message || e))));
    $("stopRunBtn").addEventListener("click", ()=>stopCurrentRun().catch((e)=>setStatus(String(e?.message || e))));
    $("refreshRunBtn").addEventListener("click", ()=>refreshRunStatus().catch((e)=>setStatus(String(e?.message || e))));
    $("loginBtn").addEventListener("click", ()=>withBusy("正在登录系统...", ()=>loginSystem()).catch((e)=>setStatus(String(e?.message || e))));
    $("checkLoginBtn").addEventListener("click", ()=>withBusy("正在检查系统登录状态...", ()=>checkSystemLogin()).catch((e)=>setStatus(String(e?.message || e))));
    $("checkLoginBtn2").addEventListener("click", ()=>withBusy("正在检查系统登录状态...", ()=>checkSystemLogin()).catch((e)=>setStatus(String(e?.message || e))));
    $("logoutBtn").addEventListener("click", ()=>withBusy("正在退出系统登录...", ()=>logoutSystem()).catch((e)=>setStatus(String(e?.message || e))));
    $("openRunnerBtn").addEventListener("click", ()=>{ window.location.href = "/rpaflows/runner"; });
    $("openConfigBtn").addEventListener("click", ()=>{ window.location.href = "/rpaflows/config"; });
    $("openBuilderBtn").addEventListener("click", ()=>{ window.location.href = "/rpaflows/builder"; });
    $("uploadFilesBtn").addEventListener("click", ()=>withBusy("正在上传文件...", ()=>uploadSelectedFiles()).catch((e)=>setStatus(String(e?.message || e))));
    $("clearUploadedBtn").addEventListener("click", ()=>clearUploadedFiles());
    $("attachmentsBox").addEventListener("click", (ev) => {
      const btn = ev.target && ev.target.closest ? ev.target.closest("[data-del-upload]") : null;
      if (!btn) return;
      removeUploadedFileAt(btn.getAttribute("data-del-upload"));
    });
    $("addOptRowBtn").addEventListener("click", () => addEmptyOptRow());
    $("parseOptsJsonBtn").addEventListener("click", () => {
      try { rebuildOptRowsFromJsonText(); setStatus("已按 JSON 重建 opts 项"); }
      catch (e) { setStatus(`opts JSON 解析失败: ${String(e?.message || e)}`); }
    });
    $("clearOptRowsBtn").addEventListener("click", () => {
      state.optRows = [];
      renderOptsEditorFromRows();
      $("optsInput").value = "{}";
      saveHomeSettings();
      setStatus("已清空 opts 项");
    });
    $("optsInput").addEventListener("input", () => saveHomeSettings());
    $("modelInput").addEventListener("change", () => saveHomeSettings());
    $("maxStepsInput").addEventListener("change", () => saveHomeSettings());
    $("aiTimeoutInput").addEventListener("change", () => saveHomeSettings());
    $("invokeStrategyInput").addEventListener("change", () => saveHomeSettings());
    $("autoCloseOpenedPagesInput").addEventListener("change", () => saveHomeSettings());
    $("goalInput").addEventListener("input", () => {
      if (!state.runId) setAnswerPlaceholderByState(null);
    });

    window.addEventListener("beforeunload", ()=>stopPolling());
    updateUi();
    applyLoginUi({ done: false });
    restoreHomeSettings();
    renderUploadedFiles();
    setAnswerPlaceholderByState(null);
    setStatus("Ready");
    withBusy("正在检查本地登录状态...", ()=>checkLocalLoginOnBoot())
      .catch((e)=>setStatus(`本地登录检查失败: ${String(e?.message || e)}`));
  </script>
</body>
</html>
